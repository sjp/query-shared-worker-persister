name: CI

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24, 26, latest]

    steps:
      - uses: actions/checkout@v7
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: ${{ matrix.node-version }}
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run lint
      - run: vp run build
      - run: vp run test
